{% extends "base.html" %}
{% block title %}Sign in · travelrouter{% endblock %}
{% block body %}
<div class="login-wrap">
  <form class="card login-card" id="loginForm" onsubmit="return false;">
    <div class="brand"><span class="dot"></span> travelrouter</div>
    <label>Username<input id="u" autocomplete="username" value="admin"></label>
    <label>Password<input id="p" type="password" autocomplete="current-password"></label>
    <button class="btn primary" id="loginBtn">Sign in</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>
<script>
document.getElementById('loginBtn').addEventListener('click', async () => {
  const err = document.getElementById('loginErr'); err.textContent = '';
  const r = await fetch('/api/login', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: u.value, password: p.value})
  });
  if (r.ok) { location.href = '/'; }
  else { const d = await r.json(); err.textContent = d.error || 'Login failed'; }
});
</script>
{% endblock %}
