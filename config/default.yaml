# Default appliance configuration applied on first boot.
appliance:
  hostname: travelrouter
  confirm_timeout_seconds: 90      # anti-lockout confirmation window
  default_admin: admin             # password is set during install

# A starter AP is created on first boot so the box is reachable immediately.
# prefer_usb=true binds it to a USB Wi-Fi dongle when one is present, leaving
# the Pi's single onboard radio free for an upstream client uplink. It falls
# back to the onboard radio only if no USB radio is attached.
bootstrap_ap:
  name: TravelRouter
  ssid: TravelRouter
  prefer_usb: true
  psk: changeme-on-first-login
  band: "2.4"
  channel: 6
  subnet: 10.42.0.0/24
  dhcp_start: 10.42.0.50
  dhcp_end: 10.42.0.200
  dns_servers: 1.1.1.1,9.9.9.9
  routing_policy: direct
